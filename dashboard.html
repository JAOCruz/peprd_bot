<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PepRD — Panel de Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f6f3ec;
      --cream-2: #efeadf;
      --teal: #2d5f5a;
      --teal-dark: #244e4a;
      --teal-deep: #1f4340;
      --gold: #c89b3c;
      --gold-soft: #e3bf65;
      --navy: #1a2332;
      --muted: #6b6f5f;
      --danger: #b44545;
      --white: #ffffff;
      --shadow: 0 4px 18px rgba(26,35,50,0.08);
      --sans: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: "Fraunces", Georgia, "Times New Roman", serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--navy);
      display: flex;
      min-height: 100vh;
    }
    .serif { font-family: var(--serif); }

    /* Sidebar */
    aside.sidebar {
      width: 260px;
      background: var(--teal);
      color: var(--cream);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid rgba(0,0,0,0.05);
    }
    .brand {
      text-align: center;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(246,243,236,0.12);
    }
    .brand .logo {
      width: 68px; height: 68px; margin: 0 auto 10px;
      background: var(--cream);
      border: 2px solid var(--gold);
      border-radius: 12px;
      display: grid; place-items: center;
      font-family: var(--serif);
      font-style: italic;
      font-weight: 600;
      font-size: 28px;
      color: var(--teal-deep);
    }
    .brand h1 { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--cream); letter-spacing: -0.5px; }
    .brand p { font-family: var(--mono); font-size: 10px; color: var(--gold-soft); margin-top: 4px; letter-spacing: 1.5px; text-transform: uppercase; }

    nav { display: flex; flex-direction: column; gap: 2px; margin-top: 10px; }
    nav a {
      color: var(--cream);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    nav a:hover { background: rgba(246,243,236,0.06); }
    nav a.active { background: rgba(200,155,60,0.15); border-left-color: var(--gold); color: var(--gold-soft); font-weight: 500; }

    .sidebar-footer {
      margin-top: auto;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(246,243,236,0.6);
      text-align: center;
      line-height: 1.6;
    }

    /* Main */
    main {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }
    h2.page-title {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 600;
      font-size: 34px;
      color: var(--teal-deep);
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }

    /* Cards */
    .grid { display: grid; gap: 18px; }
    .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .card {
      background: var(--white);
      border-radius: 8px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26,35,50,0.06);
    }
    .card h3 { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-weight: 500; }
    .card .value { font-size: 28px; font-family: var(--serif); font-style: italic; color: var(--teal-deep); font-weight: 600; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 500;
      font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px;
    }
    .badge.ok    { background: rgba(45,95,90,0.12); color: var(--teal); }
    .badge.warn  { background: rgba(200,155,60,0.18); color: var(--gold); }
    .badge.off   { background: rgba(180,69,69,0.12); color: var(--danger); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 14px; text-align: left; border-bottom: 1px solid rgba(26,35,50,0.06); font-size: 13px; }
    th { background: var(--cream-2); color: var(--teal-deep); font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }

    /* Chat */
    .chat-wrapper {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      height: calc(100vh - 180px);
    }
    .chat-panel {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(26,35,50,0.08);
    }
    .chat-header {
      background: linear-gradient(135deg, var(--teal-deep) 0%, var(--teal) 100%);
      color: var(--cream);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-header .avatar {
      width: 46px; height: 46px; border-radius: 10px;
      background: var(--cream);
      display: grid; place-items: center;
      font-family: var(--serif); font-style: italic; font-weight: 600;
      font-size: 22px;
      color: var(--teal-deep);
      border: 2px solid var(--gold);
    }
    .chat-header h3 { font-family: var(--serif); font-style: italic; font-size: 20px; font-weight: 600; }
    .chat-header p { font-size: 12px; color: var(--gold-soft); font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase; }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      background:
        radial-gradient(circle at 20% 20%, rgba(45,95,90,0.03), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(200,155,60,0.03), transparent 40%),
        var(--cream);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .empty-state {
      margin: auto;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      max-width: 340px;
    }
    .empty-state .ico { font-size: 42px; margin-bottom: 10px; font-family: var(--serif); font-style: italic; color: var(--gold); }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(26,35,50,0.06);
    }
    .msg.user {
      align-self: flex-end;
      background: var(--teal);
      color: var(--cream);
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--white);
      color: var(--navy);
      border: 1px solid rgba(26,35,50,0.06);
      border-bottom-left-radius: 4px;
    }
    .msg-meta {
      font-family: var(--mono);
      font-size: 9px;
      opacity: 0.55;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      padding: 4px 10px;
      font-family: var(--serif);
    }

    .chat-input {
      padding: 14px;
      background: var(--white);
      border-top: 1px solid rgba(26,35,50,0.06);
      display: flex;
      gap: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid rgba(26,35,50,0.12);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      background: var(--cream);
      color: var(--navy);
      font-family: var(--sans);
    }
    .chat-input input:focus { border-color: var(--teal); background: var(--white); }
    button.primary {
      background: var(--teal);
      color: var(--cream);
      border: none;
      border-radius: 6px;
      padding: 10px 22px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: var(--sans);
      font-size: 14px;
    }
    button.primary:hover { background: var(--teal-dark); }
    button.primary:disabled { opacity: 0.5; cursor: default; }
    button.ghost {
      background: transparent;
      color: var(--teal);
      border: 1px solid rgba(45,95,90,0.3);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--sans);
    }
    button.ghost:hover { background: var(--cream-2); border-color: var(--teal); }

    /* Chat side panel */
    .chat-side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-side .card { padding: 18px; }
    .chat-side .card h4 { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--teal-deep); margin-bottom: 12px; font-weight: 600; }
    .kv { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid rgba(26,35,50,0.04); }
    .kv:last-child { border-bottom: none; }
    .kv .k { color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
    .kv .v { font-weight: 500; color: var(--teal-deep); font-family: var(--mono); font-size: 11px; }

    .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .quick-btns button {
      font-size: 11px;
      background: var(--cream-2);
      color: var(--teal-deep);
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--sans);
    }
    .quick-btns button:hover { background: var(--gold-soft); color: var(--navy); }

    /* Config banner */
    .config-banner {
      background: var(--cream-2);
      color: var(--teal-deep);
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(45,95,90,0.15);
    }
    .config-banner input {
      background: var(--white);
      border: 1px solid rgba(26,35,50,0.15);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-family: var(--mono);
      width: 220px;
      color: var(--navy);
    }

    .disclaimer {
      background: rgba(200,155,60,0.08);
      border-left: 3px solid var(--gold);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--teal-deep);
      border-radius: 4px;
      margin-bottom: 20px;
      font-family: var(--sans);
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">Pep</div>
      <h1>PepRD</h1>
      <p>Research Peptides · RD</p>
    </div>
    <nav id="nav">
      <a href="#/" data-route="/">◆ Dashboard</a>
      <a href="#/chat" data-route="/chat">◇ Chat Tester</a>
      <a href="#/orders" data-route="/orders">▤ Pedidos</a>
      <a href="#/clients" data-route="/clients">◎ Clientes</a>
      <a href="#/products" data-route="/products">▣ Catálogo</a>
      <a href="#/messages" data-route="/messages">✉ Mensajes</a>
    </nav>
    <div class="sidebar-footer">
      Bot: <span id="bot-status">…</span><br>
      peprd.io · v1.0
    </div>
  </aside>

  <main id="main"></main>

  <script>
    // ===== Config =====
    const API_BASE_KEY = 'peprd-api-base';
    function getApiBase() {
      return localStorage.getItem(API_BASE_KEY) || 'http://localhost:8889/api';
    }
    function setApiBase(v) {
      localStorage.setItem(API_BASE_KEY, v);
    }
    async function api(path, opts = {}) {
      const res = await fetch(getApiBase() + path, {
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // ===== Router =====
    const routes = {
      '/': renderDashboard,
      '/chat': renderChat,
      '/orders': renderOrders,
      '/clients': renderClients,
      '/products': renderProducts,
      '/messages': renderMessages,
    };

    function router() {
      const hash = location.hash.replace(/^#/, '') || '/';
      document.querySelectorAll('#nav a').forEach((a) => {
        a.classList.toggle('active', a.dataset.route === hash);
      });
      const fn = routes[hash] || routes['/'];
      const main = document.getElementById('main');
      main.innerHTML = '';
      fn(main);
    }

    window.addEventListener('hashchange', router);
    window.addEventListener('load', () => { router(); refreshBotStatus(); });

    async function refreshBotStatus() {
      const el = document.getElementById('bot-status');
      try {
        const s = await api('/whatsapp/status');
        el.innerHTML = s.connected
          ? '<span style="color:#c89b3c">● WA</span>'
          : '<span style="color:#b44545">○ WA</span>';
      } catch {
        el.innerHTML = '<span style="color:#b44545">○ API</span>';
      }
    }

    // ===== Helpers =====
    function configBanner() {
      return `
        <div class="config-banner">
          <div><strong>API</strong></div>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="api-url-input" value="${getApiBase()}" />
            <button class="ghost" onclick="saveApi()">Guardar</button>
          </div>
        </div>`;
    }
    window.saveApi = function () {
      const v = document.getElementById('api-url-input').value.trim();
      if (v) { setApiBase(v); refreshBotStatus(); router(); }
    };

    function disclaimer() {
      return `<div class="disclaimer">⚠️ Productos para uso de investigación. No apto para consumo humano. Consulta con un profesional de la salud antes de cualquier uso.</div>`;
    }

    function fmt$(n) {
      return 'RD$' + Number(n || 0).toLocaleString('es-DO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function fmtDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleString('es-DO', { timeZone: 'America/Santo_Domingo' });
    }
    function el(html) {
      const d = document.createElement('div');
      d.innerHTML = html.trim();
      return d.firstChild;
    }

    // ===== Dashboard =====
    async function renderDashboard(main) {
      main.innerHTML = `
        <h2 class="page-title">Panel de Control</h2>
        <p class="subtitle">Resumen de actividad del bot Peppi.</p>
        ${configBanner()}
        ${disclaimer()}
        <div class="grid cols-3" style="margin-bottom:24px">
          <div class="card"><h3>Estado WhatsApp</h3><div class="value" id="stat-wa">…</div></div>
          <div class="card"><h3>Pedidos recientes</h3><div class="value" id="stat-orders">…</div></div>
          <div class="card"><h3>Mensajes hoy</h3><div class="value" id="stat-msgs">…</div></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:14px">Últimos pedidos</h3>
          <div id="recent-orders">Cargando…</div>
        </div>`;
      try {
        const wa = await api('/whatsapp/status').catch(() => ({ connected: false }));
        document.getElementById('stat-wa').textContent = wa.connected ? '● Conectado' : '○ Offline';
      } catch { document.getElementById('stat-wa').textContent = '—'; }
      try {
        const orders = await api('/orders?limit=10').catch(() => []);
        document.getElementById('stat-orders').textContent = orders.length;
        const host = document.getElementById('recent-orders');
        if (!orders.length) { host.innerHTML = '<p style="color:var(--muted)">Sin pedidos aún.</p>'; }
        else {
          host.innerHTML = `
            <table><thead><tr><th>#</th><th>Cliente</th><th>Estado</th><th style="text-align:right">Total</th><th>Fecha</th></tr></thead>
            <tbody>${orders.map((o) => `<tr>
              <td style="font-family:var(--mono);font-size:11px">${o.order_number}</td><td>${o.client_id ?? '—'}</td>
              <td><span class="badge ${o.status === 'pending' ? 'warn' : 'ok'}">${o.status}</span></td>
              <td style="text-align:right;font-family:var(--mono)">${fmt$(o.total)}</td><td>${fmtDate(o.created_at)}</td>
            </tr>`).join('')}</tbody></table>`;
        }
      } catch (e) {
        document.getElementById('stat-orders').textContent = '—';
        document.getElementById('recent-orders').innerHTML = `<p style="color:var(--muted)">API sin conexión. Inicia el backend en :8889 y guarda la URL arriba.</p>`;
      }
      try {
        const msgs = await api('/messages?limit=500');
        const today = new Date().toDateString();
        document.getElementById('stat-msgs').textContent = msgs.filter((m) => new Date(m.created_at).toDateString() === today).length;
      } catch { document.getElementById('stat-msgs').textContent = '—'; }
    }

    // ===== Chat Tester =====
    const CHAT_SESSION_KEY = 'peprd-chat-session';
    function chatSessionId() {
      let id = localStorage.getItem(CHAT_SESSION_KEY);
      if (!id) { id = 'web-' + Date.now(); localStorage.setItem(CHAT_SESSION_KEY, id); }
      return id;
    }

    function renderChat(main) {
      const sid = chatSessionId();
      main.innerHTML = `
        <h2 class="page-title">Chat con Peppi</h2>
        <p class="subtitle">Prueba el asistente sin WhatsApp. Misma lógica de flujos.</p>
        ${configBanner()}
        <div class="chat-wrapper">
          <div class="chat-panel">
            <div class="chat-header">
              <div class="avatar">P</div>
              <div style="flex:1">
                <h3>Peppi</h3>
                <p>PepRD · Research Peptides</p>
              </div>
              <button class="ghost" id="btn-reset" style="border-color:rgba(246,243,236,0.3);color:var(--cream)">Reiniciar</button>
            </div>
            <div class="chat-body" id="chat-body">
              <div class="empty-state">
                <div class="ico">Pep</div>
                <p>Saluda a Peppi para empezar.<br>Prueba: <em>"hola"</em>, <em>"catálogo"</em>, <em>"qué es BPC-157"</em></p>
              </div>
            </div>
            <div class="chat-input">
              <input id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off" />
              <button class="primary" id="btn-send">Enviar</button>
            </div>
          </div>
          <aside class="chat-side">
            <div class="card">
              <h4>Estado de la sesión</h4>
              <div class="kv"><span class="k">Session</span><span class="v" id="si-sid">${sid}</span></div>
              <div class="kv"><span class="k">Flow</span><span class="v" id="si-flow">—</span></div>
              <div class="kv"><span class="k">Step</span><span class="v" id="si-step">—</span></div>
            </div>
            <div class="card">
              <h4>Atajos</h4>
              <div class="quick-btns">
                <button data-q="hola">hola</button>
                <button data-q="menu">menu</button>
                <button data-q="1">1 · Catálogo</button>
                <button data-q="2">2 · Pedir</button>
                <button data-q="3">3 · Consulta</button>
                <button data-q="4">4 · Envíos</button>
                <button data-q="5">5 · Ventas</button>
                <button data-q="qué es BPC-157?">¿BPC-157?</button>
                <button data-q="diferencia entre tirzepatide y semaglutide">Tirz vs Sema</button>
                <button data-q="dosis de TB-500">Dosis TB-500</button>
              </div>
            </div>
            <div class="card">
              <h4>Notas</h4>
              <p style="font-size:11px;color:var(--muted);line-height:1.6;font-family:var(--sans)">
                • Productos para investigación, nunca consejo médico.<br>
                • Mensajes se guardan en la tabla <code style="font-family:var(--mono);font-size:10px">messages</code>.<br>
                • "Reiniciar" limpia flow/step.
              </p>
            </div>
          </aside>
        </div>`;

      const body = document.getElementById('chat-body');
      const input = document.getElementById('chat-input');
      const sendBtn = document.getElementById('btn-send');
      const resetBtn = document.getElementById('btn-reset');

      function clearEmpty() {
        const es = body.querySelector('.empty-state');
        if (es) es.remove();
      }

      function addMsg(text, from, meta) {
        clearEmpty();
        const node = el(`<div class="msg ${from}"></div>`);
        node.textContent = text;
        if (meta) {
          const m = document.createElement('div');
          m.className = 'msg-meta';
          m.textContent = meta;
          node.appendChild(m);
        }
        body.appendChild(node);
        body.scrollTop = body.scrollHeight;
      }

      async function send() {
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMsg(text, 'user');
        sendBtn.disabled = true;
        const typing = el('<div class="typing">Peppi está escribiendo…</div>');
        body.appendChild(typing);
        body.scrollTop = body.scrollHeight;
        try {
          const res = await api('/chat/message', {
            method: 'POST',
            body: JSON.stringify({ text, sessionId: sid }),
          });
          typing.remove();
          for (const r of res.responses || []) {
            addMsg(r.body, 'bot', r.flow ? `${r.flow}${r.step ? ' → ' + r.step : ''}` : null);
          }
          document.getElementById('si-flow').textContent = res.session?.flow || '—';
          document.getElementById('si-step').textContent = res.session?.step || '—';
        } catch (err) {
          typing.remove();
          addMsg('⚠️ Error: ' + err.message, 'bot');
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      }

      sendBtn.onclick = send;
      input.onkeydown = (e) => { if (e.key === 'Enter') send(); };
      resetBtn.onclick = async () => {
        try { await api('/chat/reset', { method: 'POST', body: JSON.stringify({ sessionId: sid }) }); } catch {}
        body.innerHTML = `<div class="empty-state"><div class="ico">Pep</div><p>Conversación reiniciada.</p></div>`;
        document.getElementById('si-flow').textContent = '—';
        document.getElementById('si-step').textContent = '—';
      };
      document.querySelectorAll('.quick-btns button').forEach((b) => {
        b.onclick = () => { input.value = b.dataset.q; send(); };
      });

      api('/chat/state?sessionId=' + encodeURIComponent(sid)).then((s) => {
        document.getElementById('si-flow').textContent = s.flow || '—';
        document.getElementById('si-step').textContent = s.step || '—';
      }).catch(() => {});

      input.focus();
    }

    // ===== Orders =====
    async function renderOrders(main) {
      main.innerHTML = `
        <h2 class="page-title">Pedidos</h2>
        <p class="subtitle">Últimos pedidos recibidos por el bot.</p>
        ${configBanner()}
        <div class="card"><div id="orders-list">Cargando…</div></div>`;
      try {
        const rows = await api('/orders');
        const host = document.getElementById('orders-list');
        if (!rows.length) { host.innerHTML = '<p style="color:var(--muted)">Sin pedidos.</p>'; return; }
        host.innerHTML = `<table><thead><tr><th>#</th><th>Cliente</th><th>Estado</th><th>Tipo</th><th style="text-align:right">Total</th><th>Fecha</th></tr></thead>
          <tbody>${rows.map((o) => `<tr>
            <td style="font-family:var(--mono);font-size:11px">${o.order_number}</td><td>${o.client_id ?? '—'}</td>
            <td><span class="badge ${o.status === 'pending' ? 'warn' : 'ok'}">${o.status}</span></td>
            <td>${o.fulfillment}</td>
            <td style="text-align:right;font-family:var(--mono)">${fmt$(o.total)}</td>
            <td>${fmtDate(o.created_at)}</td></tr>`).join('')}</tbody></table>`;
      } catch (e) {
        document.getElementById('orders-list').innerHTML = `<p style="color:var(--muted)">Error: ${e.message}. Verifica que el backend esté corriendo.</p>`;
      }
    }

    // ===== Clients =====
    async function renderClients(main) {
      main.innerHTML = `
        <h2 class="page-title">Clientes</h2>
        <p class="subtitle">Base de clientes registrados por el bot.</p>
        ${configBanner()}
        <div class="card"><div id="clients-list">Cargando…</div></div>`;
      try {
        const rows = await api('/clients');
        const host = document.getElementById('clients-list');
        if (!rows.length) { host.innerHTML = '<p style="color:var(--muted)">Sin clientes.</p>'; return; }
        host.innerHTML = `<table><thead><tr><th>Teléfono</th><th>Nombre</th><th style="text-align:right">Pedidos</th><th style="text-align:right">Gastado</th><th>Última</th></tr></thead>
          <tbody>${rows.map((c) => `<tr>
            <td style="font-family:var(--mono);font-size:11px">${c.phone}</td><td>${c.name || '—'}</td>
            <td style="text-align:right">${c.total_orders}</td>
            <td style="text-align:right;font-family:var(--mono)">${fmt$(c.total_spent)}</td>
            <td>${fmtDate(c.last_interaction_at)}</td></tr>`).join('')}</tbody></table>`;
      } catch (e) {
        document.getElementById('clients-list').innerHTML = `<p style="color:var(--muted)">Error: ${e.message}</p>`;
      }
    }

    // ===== Products =====
    async function renderProducts(main) {
      main.innerHTML = `
        <h2 class="page-title">Catálogo</h2>
        <p class="subtitle">Péptidos disponibles. Edita en <code style="font-family:var(--mono);font-size:11px">seed_products.sql</code>.</p>
        ${configBanner()}
        ${disclaimer()}
        <div id="cats" style="margin-bottom:16px;display:flex;gap:6px;flex-wrap:wrap"></div>
        <div id="prods" class="grid cols-3"></div>`;
      try {
        const cats = await api('/products/categories');
        const catsHost = document.getElementById('cats');
        catsHost.innerHTML = `<button class="ghost" data-slug="">Todos</button>` +
          cats.map((c) => `<button class="ghost" data-slug="${c.slug}">${c.emoji || '·'} ${c.name}</button>`).join('');
        catsHost.querySelectorAll('button').forEach((b) => { b.onclick = () => loadProds(b.dataset.slug); });
        await loadProds('');
      } catch (e) {
        document.getElementById('prods').innerHTML = `<p style="color:var(--muted)">Error: ${e.message}</p>`;
      }
    }
    async function loadProds(slug) {
      const host = document.getElementById('prods');
      try {
        const items = await api('/products' + (slug ? '?category=' + encodeURIComponent(slug) : ''));
        if (!items.length) { host.innerHTML = '<p style="color:var(--muted)">Sin productos en esta categoría.</p>'; return; }
        host.innerHTML = items.map((p) => `
          <div class="card">
            <div style="font-family:var(--serif);font-style:italic;font-size:18px;color:var(--teal-deep);font-weight:600">${p.name}</div>
            <div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px">${p.sku || ''} · ${p.unit || ''}</div>
            <div style="font-size:12px;color:var(--muted);margin:8px 0;line-height:1.5">${p.description || ''}</div>
            <div style="font-family:var(--mono);font-size:18px;color:var(--gold);font-weight:500;margin-top:8px">${fmt$(p.price)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px">${p.available ? '● Disponible' : '○ Agotado'}</div>
          </div>`).join('');
      } catch (e) {
        host.innerHTML = `<p style="color:var(--muted)">Error: ${e.message}</p>`;
      }
    }

    // ===== Messages =====
    function renderMessages(main) {
      main.innerHTML = `
        <h2 class="page-title">Mensajes</h2>
        <p class="subtitle">Historial completo (WhatsApp + Chat Tester).</p>
        ${configBanner()}
        <div class="card" style="margin-bottom:16px">
          <input id="msg-q" placeholder="Buscar..." style="width:100%;padding:10px 14px;border:1px solid rgba(26,35,50,0.12);border-radius:6px;background:var(--cream);font-size:14px;font-family:var(--sans);color:var(--navy)" />
        </div>
        <div class="card" id="msgs"><p style="color:var(--muted)">Cargando…</p></div>`;
      async function load(q) {
        try {
          const rows = await api('/messages' + (q ? '?q=' + encodeURIComponent(q) : ''));
          const host = document.getElementById('msgs');
          if (!rows.length) { host.innerHTML = '<p style="color:var(--muted)">Sin mensajes.</p>'; return; }
          host.innerHTML = rows.map((m) => `
            <div style="padding:10px 0;border-bottom:1px solid rgba(26,35,50,0.04)">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px">
                <span>${m.phone} · ${m.direction === 'in' ? '← in' : '→ out'} ${m.flow ? '· ' + m.flow : ''}</span>
                <span>${fmtDate(m.created_at)}</span>
              </div>
              <div style="margin-top:4px;white-space:pre-wrap;font-size:13px">${(m.body || '').replace(/</g, '&lt;')}</div>
            </div>`).join('');
        } catch (e) {
          document.getElementById('msgs').innerHTML = `<p style="color:var(--muted)">Error: ${e.message}</p>`;
        }
      }
      load('');
      let t;
      document.getElementById('msg-q').oninput = (e) => {
        clearTimeout(t);
        t = setTimeout(() => load(e.target.value), 300);
      };
    }
  </script>
</body>
</html>
